spring.application.name=experienzia

server.port=8080


experienzia.jwt.secret=cambia-este-secreto-en-produccion-min-32-chars
experienzia.jwt.expiration-ms=86400000


experienzia.precio-por-hora=100000

experienzia.eventos.zona-horaria=America/Bogota


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


server.error.include-message=always
server.error.include-binding-errors=always


management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://localhost:5432/experienzia
spring.datasource.username=postgres
spring.datasource.password=fabrica2024*

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packagesToScan=com.experienzia.controller