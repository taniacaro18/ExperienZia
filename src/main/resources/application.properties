spring.application.name=experienzia

server.port=8080

# JWT (cambia el secreto en producción; mínimo recomendado 32 caracteres)
experienzia.jwt.secret=cambia-este-secreto-en-produccion-min-32-chars
experienzia.jwt.expiration-ms=86400000

# --- Reglas de negocio ---
# Tarifa por hora del evento. El costo del evento se calcula automáticamente como precioPorHora * duracionHoras.
experienzia.precio-por-hora=100000
# Zona horaria para decidir si un evento ya terminó (catálogo público, marcar FINALIZADO, etc.).
# Las fechas guardadas (LocalDateTime) se interpretan como hora local en esta zona.
experienzia.eventos.zona-horaria=America/Bogota

# Subida de archivos (comprobantes de pago, plantillas masivas)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mensajes detallados de error en respuesta (incluye mensaje de excepción)
server.error.include-message=always
server.error.include-binding-errors=always

# Salud del servicio (comprobar en Postman: GET http://localhost:8080/actuator/health )
management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://localhost:5432/experienzia
spring.datasource.username=postgres
spring.datasource.password=fabrica2024*

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packagesToScan=com.experienzia.controller