spring.application.name=experienzia-test

spring.datasource.url=jdbc:h2:mem:experienziatest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

experienzia.jwt.secret=test-test-test-secret-for-tests-only-32b
experienzia.jwt.expiration-ms=3600000
