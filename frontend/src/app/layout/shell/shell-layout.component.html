<!-- Vista HTML de src/app/layout/shell/shell-layout.component.html (plantilla de la pantalla en Angular) -->
<div class="flex min-h-0 flex-1 flex-col bg-white w-full min-w-0">
  <header
    class="app-shell-header h-14 sm:h-16 shrink-0 px-3 sm:px-4 lg:px-6 lg:pl-[calc(14rem+1rem)] text-white flex items-center justify-between gap-2 sm:gap-4 min-w-0 relative z-30 border-b border-white/10"
  >
    <div class="flex items-center gap-2 shrink-0">
      <button
        type="button"
        class="lg:hidden p-2 rounded-md hover:bg-white/15 text-white"
        (click)="toggleSidebar()"
        aria-label="Abrir menú"
      >
        <i class="pi pi-bars"></i>
      </button>
      <app-logo class="lg:hidden" size="sm" link="/inicio" [onNavigate]="cerrarSidebarMobile" />
    </div>



    <div class="flex items-center gap-1 sm:gap-2 shrink-0">
      @if (store.usuario(); as u) {
        <a
          routerLink="/notificaciones"
          class="relative h-9 w-9 rounded-full bg-brand-600 hover:bg-brand-700 text-white flex items-center justify-center transition"
          title="Notificaciones"
        >
          <i class="pi pi-bell text-[14px]"></i>
          @if (notif.noLeidas() > 0) {
            <span
              class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-extrabold flex items-center justify-center border-2 border-white/70"
            >
              {{ notif.noLeidas() > 99 ? '99+' : notif.noLeidas() }}
            </span>
          }
        </a>
        <p-menu #menu [model]="menuPerfil" [popup]="true"></p-menu>
        <button
          type="button"
          (click)="menu.toggle($event)"
          class="px-3 h-9 rounded-full bg-brand-600 hover:bg-brand-700 text-white font-bold text-xs transition flex items-center gap-2"
        >
          <p-avatar
            [label]="iniciales(u.nombre)"
            styleClass="!bg-white !text-brand-700 font-bold !w-6 !h-6 !text-[10px]"
            shape="circle"
          ></p-avatar>
          <span class="hidden md:inline">Perfil</span>
        </button>
        <button
          type="button"
          (click)="cerrarSesion()"
          class="px-3 h-9 rounded-full bg-brand-700 hover:bg-brand-800 text-white font-bold text-xs transition flex items-center gap-1.5"
        >
          <i class="pi pi-sign-out text-[10px]"></i>
          <span class="hidden md:inline">Cerrar Sesión</span>
        </button>
      }
    </div>
  </header>

  <div class="flex flex-1 min-h-0 w-full min-w-0 flex-row bg-white">
    <aside
      [class.-translate-x-full]="!pantallaGrande() && !sidebarAbierto()"
      [class.translate-x-0]="!pantallaGrande() && sidebarAbierto()"
      class="app-shell-sidebar flex w-56 flex-col min-h-0 overflow-hidden
             fixed left-0 z-[50] bottom-0
             max-lg:top-14 sm:max-lg:top-16 max-lg:transform max-lg:transition-transform max-lg:duration-200 max-lg:ease-out
             lg:top-0 lg:transform-none lg:transition-none"
    >
      <div class="app-shell-sidebar-brand relative z-[1] px-2 sm:px-3 pt-3 sm:pt-4 pb-2 sm:pb-3 flex flex-col items-center">
        <app-logo
          size="sidebar"
          link="/inicio"
          [onNavigate]="cerrarSidebarMobile"
        />
      </div>

      <nav class="relative z-[1] flex-1 px-2 sm:px-3 pt-0.5 pb-4 sm:pb-5 overflow-y-auto overflow-x-hidden min-h-0">
        <ul class="space-y-2">
          @for (item of itemsVisibles(); track item.ruta) {
            <li>
              <a
                [routerLink]="item.ruta"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: false }"
                class="sidebar-item"
                (click)="cerrarSidebarMobile()"
              >
                <i class="pi text-xs" [ngClass]="item.icono"></i>
                <span>{{ item.etiqueta }}</span>
              </a>
            </li>
          }
        </ul>
      </nav>
    </aside>

    @if (sidebarAbierto()) {
      <div
        class="lg:hidden fixed inset-0 max-lg:top-14 sm:max-lg:top-16 bg-black/40 z-40"
        (click)="cerrarSidebarMobile()"
      ></div>
    }

    <main
      class="app-shell-main flex-1 min-w-0 min-h-0 w-full overflow-y-auto overflow-x-auto bg-white px-4 py-4 sm:px-5 sm:py-5 lg:py-6 lg:pl-[calc(14rem+1.5rem)] lg:pr-8 xl:pl-[calc(14rem+2rem)] xl:pr-10"
    >
      <router-outlet></router-outlet>
    </main>
  </div>

  <app-qr-inscripcion-dialog />

  <footer
    class="app-shell-footer shrink-0 relative z-20 px-4 sm:px-6 py-2.5 sm:py-3 lg:pl-[calc(14rem+1.5rem)] lg:pr-8 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between min-w-0 text-white/85 text-[10px] sm:text-[11px] border-t border-white/10"
  >
    <div class="flex items-center gap-3 min-w-0 flex-1">
      <app-logo size="sm" link="/inicio" />
      <span class="break-words sm:truncate min-w-0">© {{ anio }} ExperienZia · Plataforma de eventos</span>
    </div>

  </footer>
</div>
