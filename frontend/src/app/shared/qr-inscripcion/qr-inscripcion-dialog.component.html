<p-dialog
  [visible]="ui.visible()"
  (visibleChange)="!$event && ui.cerrar()"
  [modal]="true"
  [closable]="true"
  [header]="ui.titulo()"
  [style]="{ width: '420px' }"
>
  @if (ui.visible()) {
    <div class="text-center space-y-4">
      <p class="text-xs text-surface-500">
        Muestra este código al staff a la entrada del evento.
      </p>

      <div class="flex justify-center">
        @if (ui.qrDataUrl(); as url) {
          <img [src]="url" alt="Código QR" class="rounded-md border border-surface-200 p-2 bg-white" />
        }
      </div>

      @if (ui.codigo(); as codigo) {
        <div class="text-[11px] text-surface-500 break-all bg-surface-50 rounded p-2 font-mono">
          {{ codigo }}
        </div>
      }

      <button type="button" class="ez-btn-primary inline-flex" (click)="ui.descargar()">
        <i class="pi pi-download text-[10px]"></i> Descargar PNG
      </button>
    </div>
  }
</p-dialog>
